name: Publish Release

on:
  push:
    tags:
      - 'v*'

permissions: write-all

jobs:
  github-release:
    runs-on: ubuntu-latest
    outputs:
      release_sha: ${{ steps.sync_tag.outputs.release_sha }}
      release_tag: ${{ steps.sync_tag.outputs.tag }}
      release_version: ${{ steps.sync_tag.outputs.version }}
      retagged: ${{ steps.sync_tag.outputs.retagged }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Fetching tags
        run: git fetch --tags -f || true

      - name: Setup Node
        uses: actions/setup-node@v3.6.0
        with:
          node-version: 20.x

      - name: Validate tag and align package version
        id: sync_tag
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION). Aligning package.json and retagging."

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git tag -d "$TAG_NAME" || true
            git push origin ":refs/tags/$TAG_NAME" || true

            git fetch origin "$DEFAULT_BRANCH":"$DEFAULT_BRANCH"
            git checkout "$DEFAULT_BRANCH"

            npx json -I -f package.json -e "this.version='$TAG_VERSION'"
            git add package.json

            if ! git diff --cached --quiet; then
              git commit -m "chore(release): align package version with $TAG_NAME"
            fi

            RELEASE_SHA=$(git rev-parse HEAD)
            git tag "$TAG_NAME" "$RELEASE_SHA"
            git push origin "HEAD:$DEFAULT_BRANCH"
            git push origin "refs/tags/$TAG_NAME"
            RETAGGED=true
          else
            RELEASE_SHA=$(git rev-parse HEAD)
            RETAGGED=false
          fi

          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "retagged=$RETAGGED" >> "$GITHUB_OUTPUT"

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v3
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/package.json', '**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install Dependencies
        run: |
          if [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          else
            yarn install --no-lockfile
          fi

      - name: Generate Changelog
        id: generate_changelog
        run: |
          changelog=$(npm run changelog:last --silent)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "${changelog}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.sync_tag.outputs.retagged != 'true'
        uses: meeDamian/github-release@2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.sync_tag.outputs.tag }}
          commitish: ${{ steps.sync_tag.outputs.release_sha }}
          name: ${{ steps.sync_tag.outputs.tag }}
          body: ${{ steps.generate_changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(steps.sync_tag.outputs.tag, '-') }}
          allow_override: true

  npm-publish:
    runs-on: ubuntu-latest
    needs: github-release
    if: needs.github-release.outputs.retagged != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ needs.github-release.outputs.release_sha }}

      - name: Fetching tags
        run: git fetch --tags -f || true

      - name: Setup Node
        uses: actions/setup-node@v3.6.0
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v3
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/package.json', '**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install Dependencies
        run: |
          if [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          else
            yarn install --no-lockfile
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Validate tag and publishability
        id: publish_guard
        run: |
          set -euo pipefail
          TAG="${{ needs.github-release.outputs.release_version }}"
          PKG_VERSION=$(node -p "require('./package.json').version")

          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG) does not match package.json version ($PKG_VERSION)."
            echo "Tag/package synchronization failed unexpectedly."
            exit 1
          fi

          if npm view libzapitu-rf@"$PKG_VERSION" version >/dev/null 2>&1; then
            echo "::error::Version $PKG_VERSION of libzapitu-rf is already published on npm."
            echo "Use a new version and push a new tag."
            exit 1
          fi

          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Build
        if: steps.publish_guard.outputs.publish == 'true'
        run: npm run build:tsc

      - name: Publish in NPM (as `libzapitu-rf` and aliases)
        if: steps.publish_guard.outputs.publish == 'true'
        run: |
          npm publish --access public --//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
          npx json -I -f package.json -e "this.name='libzapitu'"
          npm publish --access public --//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
          npx json -I -f package.json -e "this.name='zapitu'"
          npm publish --access public --//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
          npx json -I -f package.json -e "this.name='zapitu-rf'"

      - name: Make Package
        if: steps.publish_guard.outputs.publish == 'true'
        run: npm pack

      - name: Rename Pack
        if: steps.publish_guard.outputs.publish == 'true'
        run: mv *.tgz libzapitu-rf.tgz

      - name: Upload package to GitHub Release
        if: steps.publish_guard.outputs.publish == 'true'
        uses: meeDamian/github-release@2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref }}
          files: >
            libzapitu-rf.tgz
          gzip: folders
          allow_override: true
